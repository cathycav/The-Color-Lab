<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Color Palette Generator</title>
  <style>
    body {
      font-family: sans-serif;
      max-width: 700px;
      margin: 60px auto;
      padding: 0 20px;
      background: #f5f5f5;
    }
    h1 { text-align: center; }
    .input-row {
      display: flex;
      gap: 10px;
      margin-bottom: 30px;
    }
    input {
      flex: 1;
      padding: 10px;
      font-size: 1rem;
      border: 1px solid #ccc;
      border-radius: 6px;
    }
    button {
      padding: 10px 20px;
      font-size: 1rem;
      background: #333;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }
    button:disabled { background: #999; }
    #palette {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    .swatch {
      flex: 1;
      min-width: 100px;
      height: 120px;
      border-radius: 8px;
      display: flex;
      align-items: flex-end;
      padding: 8px;
      font-size: 0.8rem;
      color: white;
      text-shadow: 0 1px 3px rgba(0,0,0,0.6);
      box-shadow: 0 2px 6px rgba(0,0,0,0.15);
    }
    #error { color: red; margin-top: 10px; }
  </style>
</head>
<body>
  <h1>🎨 Color Palette Generator</h1>
  <div class="input-row">
    <input id="promptInput" type="text" placeholder='Describe a mood or theme, e.g. "sunset over the ocean"' />
    <button id="generateBtn" onclick="generatePalette()">Generate</button>
  </div>
  <div id="palette"></div>
  <div id="error"></div>

  <script>
    const WORKER_URL = "https://YOUR-WORKER.YOUR-SUBDOMAIN.workers.dev";

    async function generatePalette() {
      const input = document.getElementById("promptInput").value.trim();
      const btn = document.getElementById("generateBtn");
      const paletteDiv = document.getElementById("palette");
      const errorDiv = document.getElementById("error");

      if (!input) return;

      btn.disabled = true;
      btn.textContent = "Generating...";
      paletteDiv.innerHTML = "";
      errorDiv.textContent = "";

      try {
        const response = await fetch(WORKER_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            prompt: `Generate a color palette for: "${input}". 
                     Respond with ONLY a JSON array of 5 objects, each with "name" and "hex" keys.
                     Example: [{"name":"Ocean Blue","hex":"#1A6B8A"}]`
          })
        });

        const palette = await response.json();

        if (palette.error) {
          errorDiv.textContent = "Error: " + palette.error;
          return;
        }

        palette.forEach(color => {
          const swatch = document.createElement("div");
          swatch.className = "swatch";
          swatch.style.backgroundColor = color.hex;
          swatch.textContent = `${color.name} ${color.hex}`;
          paletteDiv.appendChild(swatch);
        });

      } catch (err) {
        errorDiv.textContent = "Failed to connect to worker: " + err.message;
      } finally {
        btn.disabled = false;
        btn.textContent = "Generate";
      }
    }

    document.getElementById("promptInput").addEventListener("keydown", e => {
      if (e.key === "Enter") generatePalette();
    });
  </script>
</body>
</html>
